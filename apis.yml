---
aid: netdata
name: Netdata
description: >-
  Netdata is a real-time infrastructure monitoring and observability platform
  that collects per-second metrics from physical servers, virtual machines,
  cloud deployments, Kubernetes clusters, and IoT devices. It provides a
  REST API for querying metrics, alerts, and configuration on individual nodes
  (Agent API) as well as a Cloud API for programmatic access to Netdata Cloud
  resources including spaces, rooms, and nodes across distributed
  infrastructure. Authentication uses Bearer tokens generated from the Netdata
  Cloud account settings, with scopes controlling access to agent UI, Grafana
  plugin, MCP, and full API access. The platform includes AI-powered
  troubleshooting, role-based access control, and supports both cloud-hosted
  and on-premises deployments.
type: Index
