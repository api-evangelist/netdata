          - $ref: '#/components/schemas/github_com_netdata_cloud-api-docs_cloud-alarm-processor-service_api.MisconfiguredNode'
    github_com_netdata_cloud-api-docs_cloud-alarm-processor-service_api.stuckRaisedResponse:
