principles:
  - name: Visibility
    description: >-
      Track total active node count monthly via Netdata Cloud account dashboard
      to understand spend trajectory. Offline nodes are automatically excluded
      from billing.
  - name: Optimization
    description: >-
      Right-size node deployments by decommissioning idle agents; containers
      on monitored hosts are free, so consolidating workloads onto fewer hosts
      reduces billable node count. Top-10% spike exclusion protects against
      transient burst costs.
  - name: Allocation
    description: >-
      Allocate costs by space or room within Netdata Cloud to attribute
      monitoring expenses to engineering teams or business units managing
      those infrastructure segments.
