description: >-
  FOCUS-aligned FinOps guidance for Netdata Cloud. Billing is node-based at
  $4.50/node/month (annual) for the Business plan. Costs scale linearly with
  active monitored nodes; containers on monitored hosts incur no extra charge.
  Offline nodes are excluded from billing, and the top 10% of monthly usage
  spikes are excluded to avoid overcharges.
